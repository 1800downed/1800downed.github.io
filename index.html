<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Fleet Stalker - Vessel Tracking Dashboard</title>
    <!-- Leaflet Map Library -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Chart.js for Visualizations -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <!-- PapaParse for CSV Processing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        /* Root CSS Variables for theming - all colors controlled here */
        :root {
            --primary-bg: #0f172a;
            --secondary-bg: #1e293b;
            --card-bg: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --border-color: #475569;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        /* Light mode variables - applied when data-theme="light" */
        [data-theme="light"] {
            --primary-bg: #ffffff;
            --secondary-bg: #f8fafc;
            --card-bg: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --accent: #2563eb;
            --border-color: #e2e8f0;
        }

        /* Universal Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--primary-bg);
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Navigation Bar */
        #navbar {
            background: var(--secondary-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .navbar-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        #logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            white-space: nowrap;
        }

        /* Control Panel */
        #controls {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        /* Buttons */
        .btn, select {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
            font-size: 0.95rem;
        }

        .btn:hover {
            background: var(--accent);
            opacity: 0.9;
            transform: translateY(-2px);
        }

        /* Dropdown Select */
        select {
            background: var(--card-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 0.5rem 0.75rem;
        }

        select:hover {
            border-color: var(--accent);
        }

        /* Icon Button */
        .btn-icon {
            background: var(--card-bg);
            color: var(--text-primary);
            padding: 0.5rem;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }

        .btn-icon:hover {
            background: var(--accent);
            color: white;
            transform: scale(1.1);
        }

        /* Main Dashboard Layout */
        #dashboard {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 1rem;
            padding: 1rem;
            height: calc(100vh - 80px);
        }

        /* Map Container */
        #mapContainer {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: var(--shadow);
            background: var(--card-bg);
        }

        #mainMap {
            height: 100%;
            width: 100%;
        }

        /* Sidebar Panel */
        #sidebar {
            background: var(--secondary-bg);
            border-radius: 8px;
            padding: 1.5rem;
            overflow-y: auto;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .sidebar-section {
            margin-bottom: 2rem;
        }

        .sidebar-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        /* Statistics Grid */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 1rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Vessel List */
        #vesselList {
            max-height: 400px;
            overflow-y: auto;
            scrollbar-width: thin;
        }

        .vessel-item {
            background: var(--card-bg);
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            border-radius: 6px;
            border-left: 4px solid var(--accent);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .vessel-item:hover {
            transform: translateX(4px);
            box-shadow: var(--shadow);
        }

        .vessel-item.critical { border-left-color: var(--danger); }
        .vessel-item.high { border-left-color: var(--warning); }
        .vessel-item.medium { border-left-color: var(--accent); }
        .vessel-item.monitor { border-left-color: var(--success); }

        .vessel-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
            font-size: 0.9rem;
        }

        .vessel-details {
            font-size: 0.75rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        /* Modal Dialogs */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--secondary-bg);
            border-radius: 8px;
            padding: 2rem;
            max-width: 90%;
            max-height: 90%;
            overflow: auto;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: color 0.2s ease;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        /* Chart Container */
        .chart-section {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border-color);
        }

        .chart-section h3 {
            margin-bottom: 1rem;
            font-size: 1rem;
            font-weight: 600;
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            #dashboard {
                grid-template-columns: 1fr;
                height: auto;
            }

            #sidebar {
                order: -1;
                max-height: 40vh;
            }

            .stat-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            #navbar {
                padding: 1rem;
            }

            .navbar-container {
                flex-direction: column;
                align-items: stretch;
            }

            #controls {
                justify-content: center;
            }

            #dashboard {
                padding: 0.5rem;
            }

            .stat-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                max-width: 95%;
                padding: 1rem;
            }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--card-bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
            opacity: 0.8;
        }

        /* Loading and Error States */
        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: var(--danger);
            color: white;
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <!-- Navigation Bar with Controls -->
    <nav id="navbar">
        <div class="navbar-container">
            <div id="logo">🛰️ Shadow Fleet Stalker</div>
            <div id="controls">
                <!-- Threat Level Filter -->
                <select id="threatFilter">
                    <option value="">All Threats</option>
                    <option value="CRITICAL">🔴 Critical</option>
                    <option value="HIGH">🟠 High</option>
                    <option value="MEDIUM">🔵 Medium</option>
                    <option value="MONITOR">🟢 Monitor</option>
                </select>

                <!-- Single Vessel Toggle -->
                <select id="vesselFilter">
                    <option value="">All Vessels</option>
                </select>

                <!-- Refresh Data Button -->
                <button class="btn" id="refreshBtn" title="Manually refresh vessel data">
                    ↻ Refresh
                </button>

                <!-- Dark Mode Toggle -->
                <button class="btn-icon" id="darkModeBtn" title="Toggle dark/light mode">
                    🌙
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Dashboard -->
    <div id="dashboard">
        <!-- Map Section -->
        <div id="mapContainer">
            <div id="mainMap"></div>
        </div>

        <!-- Sidebar with Stats and Vessel List -->
        <div id="sidebar">
            <!-- Statistics Section -->
            <div class="sidebar-section">
                <div class="stat-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="statsTotal">0</div>
                        <div class="stat-label">Total</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statsCritical">0</div>
                        <div class="stat-label">Critical</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statsHigh">0</div>
                        <div class="stat-label">High</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statsUpdate">--:--</div>
                        <div class="stat-label">Last Sync</div>
                    </div>
                </div>
            </div>

            <!-- Active Vessels Section -->
            <div class="sidebar-section">
                <h3 class="sidebar-title">🚢 Active Vessels (Top 10)</h3>
                <div id="vesselList"></div>
            </div>
        </div>
    </div>

    <!-- Charts Modal Dialog -->
    <div id="chartsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalVesselName">Vessel Charts</h2>
                <button class="modal-close" id="closeChartsBtn">&times;</button>
            </div>

            <!-- Speed Trend Chart -->
            <div class="chart-section">
                <h3>📊 Speed History (48 Hours)</h3>
                <canvas id="speedChart"></canvas>
            </div>

            <!-- Course Trend Chart -->
            <div class="chart-section">
                <h3>🧭 Course History (48 Hours)</h3>
                <canvas id="courseChart"></canvas>
            </div>
        </div>
    </div>

    <!-- Leaflet Map Library -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Main Application Script -->
    <script>
        // ============================================================================
        // APPLICATION STATE AND CONFIGURATION
        // ============================================================================

        const AppState = {
            // Vessel data storage
            vessels: [],
            markers: new Map(),
            currentFilter: '',
            currentThreatFilter: '',
            map: null,
            selectedVessel: null,

            // Chart instances
            speedChart: null,
            courseChart: null,

            // Update timer
            updateTimer: null,

            // Initialize application
            async init() {
                this.loadConfig();
                this.setupMap();
                this.setupEventListeners();
                this.loadVesselsFromCSV();
                this.restoreSettings();
                this.startAutoUpdate();
            },

            // Load configuration (in real app, this would be from config.json)
            loadConfig() {
                this.config = {
                    updateInterval: 10800000, // 3 hours in milliseconds
                    mapCenter: [20, 0],
                    mapZoom: 2,
                    csvUrl: 'SHADOW_FLEET_MASTER_DATABASE_COMPREHENSIVE-8.csv',
                    localStorageKey: 'shadow_fleet_vessels'
                };
            },

            // Initialize Leaflet map
            setupMap() {
                this.map = L.map('mainMap').setView(this.config.mapCenter, this.config.mapZoom);

                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap contributors',
                    maxZoom: 19
                }).addTo(this.map);
            },

            // Setup event listeners
            setupEventListeners() {
                // Threat filter change
                document.getElementById('threatFilter').addEventListener('change', (e) => {
                    this.currentThreatFilter = e.target.value;
                    this.filterAndRenderMarkers();
                });

                // Single vessel filter change
                document.getElementById('vesselFilter').addEventListener('change', (e) => {
                    this.currentFilter = e.target.value;
                    this.filterAndRenderMarkers();
                });

                // Manual refresh button
                document.getElementById('refreshBtn').addEventListener('click', () => {
                    this.loadVesselsFromCSV();
                });

                // Dark mode toggle
                document.getElementById('darkModeBtn').addEventListener('click', () => {
                    this.toggleDarkMode();
                });

                // Close charts modal
                document.getElementById('closeChartsBtn').addEventListener('click', () => {
                    document.getElementById('chartsModal').classList.remove('active');
                });
            },

            // Load and parse CSV data
            async loadVesselsFromCSV() {
                try {
                    const response = await fetch(this.config.csvUrl);
                    const csvText = await response.text();

                    Papa.parse(csvText, {
                        header: true,
                        complete: (results) => {
                            // Filter out empty rows and store vessels
                            this.vessels = results.data
                                .filter(row => row.Vessel_Name && row.IMO)
                                .slice(0, 150); // Limit to first 150 for performance

                            // Save to localStorage for offline access
                            this.saveToLocalStorage();

                            // Populate dropdown and render
                            this.populateVesselSelect();
                            this.filterAndRenderMarkers();
                            this.updateStatistics();
                            this.updateTimestamp();
                        },
                        error: (error) => {
                            console.error('CSV parsing error:', error);
                            alert('Error loading vessel data: ' + error.message);
                        }
                    });
                } catch (error) {
                    console.error('CSV fetch error:', error);
                    alert('Could not load CSV file. Using cached data.');
                    this.loadFromLocalStorage();
                }
            },

            // Save vessel data to browser localStorage
            saveToLocalStorage() {
                try {
                    localStorage.setItem(
                        this.config.localStorageKey,
                        JSON.stringify({
                            vessels: this.vessels,
                            timestamp: new Date().toISOString()
                        })
                    );
                } catch (e) {
                    console.warn('localStorage save failed:', e);
                }
            },

            // Load vessel data from browser localStorage
            loadFromLocalStorage() {
                try {
                    const stored = localStorage.getItem(this.config.localStorageKey);
                    if (stored) {
                        const data = JSON.parse(stored);
                        this.vessels = data.vessels || [];
                        return true;
                    }
                } catch (e) {
                    console.warn('localStorage load failed:', e);
                }
                return false;
            },

            // Populate vessel dropdown select
            populateVesselSelect() {
                const select = document.getElementById('vesselFilter');
                select.innerHTML = '<option value="">All Vessels</option>';

                this.vessels.slice(0, 50).forEach(vessel => {
                    const option = document.createElement('option');
                    option.value = vessel.IMO;
                    option.textContent = `${vessel.Vessel_Name} (${vessel.IMO})`;
                    select.appendChild(option);
                });
            },

            // Filter vessels and render map markers
            filterAndRenderMarkers() {
                // Clear existing markers
                this.markers.forEach(marker => {
                    this.map.removeLayer(marker);
                });
                this.markers.clear();

                // Filter vessels based on current filters
                const filtered = this.vessels.filter(vessel => {
                    const matchesVessel = !this.currentFilter || vessel.IMO === this.currentFilter;
                    const matchesThreat = !this.currentThreatFilter || vessel.Threat_Level === this.currentThreatFilter;
                    return matchesVessel && matchesThreat;
                });

                // Render markers for filtered vessels
                filtered.forEach(vessel => {
                    this.addVesselMarker(vessel);
                });

                // Update sidebar with filtered vessels
                this.updateVesselList(filtered);
            },

            // Parse GPS location string "lat°N, lon°E" format
            parseLocation(locationStr) {
                if (!locationStr) return null;
                const match = locationStr.match(/(-?\d+(?:\.\d+)?)°([NS]),\s*(-?\d+(?:\.\d+)?)°([EW])/);
                if (!match) return null;

                let lat = parseFloat(match[1]);
                let lon = parseFloat(match[3]);

                if (match[2] === 'S') lat = -lat;
                if (match[4] === 'W') lon = -lon;

                return [lat, lon];
            },

            // Add a single vessel marker to map
            addVesselMarker(vessel) {
                const position = this.parseLocation(vessel.Last_Signal_Location);
                if (!position) return;

                // Create custom icon with threat color
                const threatColor = this.getThreatColor(vessel.Threat_Level);
                const icon = L.divIcon({
                    className: 'vessel-marker',
                    html: `<div style="
                        background: ${threatColor};
                        width: 16px;
                        height: 16px;
                        border-radius: 50%;
                        border: 3px solid white;
                        box-shadow: 0 2px 8px rgba(0,0,0,0.4);
                    "></div>`,
                    iconSize: [16, 16]
                });

                const marker = L.marker(position, { icon }).addTo(this.map);

                // Build popup content with vessel information
                const popupContent = `
                    <div style="min-width: 280px; font-size: 13px;">
                        <h4 style="margin: 0 0 10px 0; color: #3b82f6;">${vessel.Vessel_Name}</h4>
                        <table style="width: 100%; border-collapse: collapse;">
                            <tr><td><strong>IMO:</strong></td><td>${vessel.IMO}</td></tr>
                            <tr><td><strong>Flag:</strong></td><td>${vessel.Current_Flag}</td></tr>
                            <tr><td><strong>Type:</strong></td><td>${vessel.Vessel_Type}</td></tr>
                            <tr><td><strong>Owner:</strong></td><td>${vessel.Beneficial_Owner}</td></tr>
                            <tr><td><strong>Position:</strong></td><td>${vessel.Last_Signal_Location}</td></tr>
                            <tr><td><strong>Threat:</strong></td><td style="color: ${threatColor};">
                                <strong>${vessel.Threat_Level}</strong>
                            </td></tr>
                            <tr><td><strong>Updated:</strong></td><td>${vessel.Last_Signal_Date}</td></tr>
                        </table>
                        <div style="margin-top: 12px; display: flex; gap: 6px;">
                            <button onclick="AppState.showVesselCharts('${vessel.IMO}', '${vessel.Vessel_Name}')" 
                                style="flex: 1; padding: 6px 10px; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px;">
                                📊 Charts
                            </button>
                            <a href="${vessel.Tracking_URL_MarineTraffic}" target="_blank"
                                style="flex: 1; padding: 6px 10px; background: #10b981; color: white; border-radius: 4px; text-align: center; text-decoration: none; font-size: 12px; cursor: pointer;">
                                🔗 Track
                            </a>
                        </div>
                    </div>
                `;

                marker.bindPopup(popupContent);
                marker.vessel = vessel;

                // Store marker reference
                this.markers.set(vessel.IMO, marker);
            },

            // Get color for threat level
            getThreatColor(threatLevel) {
                const colors = {
                    'CRITICAL': '#ef4444',
                    'HIGH': '#f59e0b',
                    'MEDIUM': '#3b82f6',
                    'MONITOR': '#10b981'
                };
                return colors[threatLevel] || '#94a3b8';
            },

            // Update sidebar vessel list
            updateVesselList(vessels) {
                const listHtml = vessels.slice(0, 10).map(vessel => `
                    <div class="vessel-item ${vessel.Threat_Level.toLowerCase()}" 
                         onclick="AppState.focusVessel('${vessel.IMO}')">
                        <div class="vessel-name">${vessel.Vessel_Name}</div>
                        <div class="vessel-details">
                            ${vessel.Current_Flag} | ${vessel.Vessel_Type}
                            <br><span style="color: ${this.getThreatColor(vessel.Threat_Level)};">
                                ${vessel.Threat_Level}
                            </span>
                        </div>
                    </div>
                `).join('');

                document.getElementById('vesselList').innerHTML = listHtml || '<p>No vessels match filter</p>';
            },

            // Focus map on specific vessel
            focusVessel(imo) {
                const vessel = this.vessels.find(v => v.IMO === imo);
                if (!vessel) return;

                const position = this.parseLocation(vessel.Last_Signal_Location);
                if (position) {
                    this.map.setView(position, 6);
                    const marker = this.markers.get(imo);
                    if (marker) {
                        marker.openPopup();
                    }
                }
            },

            // Update dashboard statistics
            updateStatistics() {
                const total = this.vessels.length;
                const critical = this.vessels.filter(v => v.Threat_Level === 'CRITICAL').length;
                const high = this.vessels.filter(v => v.Threat_Level === 'HIGH').length;

                document.getElementById('statsTotal').textContent = total;
                document.getElementById('statsCritical').textContent = critical;
                document.getElementById('statsHigh').textContent = high;
            },

            // Update last sync timestamp
            updateTimestamp() {
                const now = new Date();
                const timeStr = now.toLocaleTimeString('en-US', { 
                    hour: '2-digit', 
                    minute: '2-digit',
                    hour12: false
                });
                document.getElementById('statsUpdate').textContent = timeStr;
            },

            // Show vessel trend charts in modal
            showVesselCharts(imo, vesselName) {
                this.selectedVessel = this.vessels.find(v => v.IMO === imo);
                if (!this.selectedVessel) return;

                // Show modal
                document.getElementById('chartsModal').classList.add('active');
                document.getElementById('modalVesselName').textContent = vesselName + ' - Trend Analysis';

                // Generate mock historical data (in production, this would come from AIS API)
                const history = this.generateMockHistory();

                // Create or update speed chart
                this.createSpeedChart(history);

                // Create or update course chart
                this.createCourseChart(history);
            },

            // Generate mock 48-hour history (for demonstration)
            generateMockHistory() {
                const hours = [];
                const speedData = [];
                const courseData = [];

                for (let i = 48; i >= 0; i--) {
                    hours.push(`${i}h ago`);
                    // Realistic variations: speed varies 8-16 knots
                    speedData.push(Math.max(5, 12 + Math.random() * 6 - 3));
                    // Course varies but stays in general direction
                    courseData.push((180 + Math.random() * 60 - 30 + 360) % 360);
                }

                return { hours, speedData, courseData };
            },

            // Create speed trend chart
            createSpeedChart(history) {
                const ctx = document.getElementById('speedChart').getContext('2d');

                if (this.speedChart) this.speedChart.destroy();

                this.speedChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: history.hours,
                        datasets: [{
                            label: 'Speed (knots)',
                            data: history.speedData,
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            tension: 0.4,
                            fill: true,
                            pointRadius: 0,
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: {
                            legend: {
                                display: false
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                title: { display: true, text: 'Knots' }
                            }
                        }
                    }
                });
            },

            // Create course trend chart
            createCourseChart(history) {
                const ctx = document.getElementById('courseChart').getContext('2d');

                if (this.courseChart) this.courseChart.destroy();

                this.courseChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: history.hours,
                        datasets: [{
                            label: 'Course (degrees)',
                            data: history.courseData,
                            borderColor: '#10b981',
                            backgroundColor: 'rgba(16, 185, 129, 0.1)',
                            tension: 0.4,
                            fill: true,
                            pointRadius: 0,
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: {
                            legend: {
                                display: false
                            }
                        },
                        scales: {
                            y: {
                                min: 0,
                                max: 360,
                                title: { display: true, text: 'Degrees' }
                            }
                        }
                    }
                });
            },

            // Toggle dark/light mode
            toggleDarkMode() {
                const html = document.documentElement;
                const current = html.getAttribute('data-theme');
                const next = current === 'light' ? '' : 'light';

                html.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);

                const btn = document.getElementById('darkModeBtn');
                btn.textContent = next === 'light' ? '🌙' : '☀️';
            },

            // Restore saved settings (theme, filters)
            restoreSettings() {
                const savedTheme = localStorage.getItem('theme');
                if (savedTheme) {
                    document.documentElement.setAttribute('data-theme', savedTheme);
                    const btn = document.getElementById('darkModeBtn');
                    btn.textContent = savedTheme === 'light' ? '🌙' : '☀️';
                }
            },

            // Start automatic data refresh timer
            startAutoUpdate() {
                if (this.config.updateInterval > 0) {
                    this.updateTimer = setInterval(() => {
                        console.log('Auto-updating vessel data...');
                        this.loadVesselsFromCSV();
                    }, this.config.updateInterval);
                }
            }
        };

        // ============================================================================
        // INITIALIZE APPLICATION WHEN DOM IS READY
        // ============================================================================

        document.addEventListener('DOMContentLoaded', () => {
            AppState.init();
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (AppState.updateTimer) {
                clearInterval(AppState.updateTimer);
            }
        });
    </script>
</body>
</html>
