<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vessels - Shadow Fleet Stalker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">🛰️ Shadow Fleet Stalker</h1>
            <div class="nav-links">
                <a href="index.html">Dashboard</a>
                <a href="map.html">Live Map</a>
                <a href="vessels.html" class="active">Vessels</a>
                <button id="darkModeToggle" class="btn-icon">🌙</button>
                <button id="refreshBtn" class="btn-primary">↻ Refresh</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2>Vessel Details</h2>
        <select id="vesselSelect" class="control-select" style="width: 100%; max-width: 500px; margin-bottom: 2rem;"></select>

        <div class="vessel-detail" id="vesselDetail">
            <div class="detail-grid">
                <div class="detail-card">
                    <h3>Vessel Information</h3>
                    <p><strong>Name:</strong> <span id="vName">-</span></p>
                    <p><strong>IMO:</strong> <span id="vIMO">-</span></p>
                    <p><strong>MMSI:</strong> <span id="vMMSI">-</span></p>
                    <p><strong>Flag:</strong> <span id="vFlag">-</span></p>
                    <p><strong>Owner:</strong> <span id="vOwner">-</span></p>
                </div>
                <div class="detail-card">
                    <h3>Current Position</h3>
                    <p><strong>Latitude:</strong> <span id="vLat">-</span></p>
                    <p><strong>Longitude:</strong> <span id="vLon">-</span></p>
                    <p><strong>Speed:</strong> <span id="vSpeed">-</span> knots</p>
                    <p><strong>Course:</strong> <span id="vCourse">-</span>°</p>
                    <p><strong>Updated:</strong> <span id="vTime">-</span></p>
                </div>
            </div>

            <div class="chart-container">
                <h3>Speed History (48h)</h3>
                <canvas id="speedChart"></canvas>
            </div>

            <div class="chart-container">
                <h3>Course History (48h)</h3>
                <canvas id="courseChart"></canvas>
            </div>

            <div id="vesselMap" style="height: 400px; border-radius: 8px; margin-top: 2rem;"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="app.js"></script>
    <script src="charts.js"></script>
    <script src="ais-updater.js"></script>
</body>
</html>
